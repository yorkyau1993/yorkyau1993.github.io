<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不想在大洋拉圖片的工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #333;
        }
        
        .container { width: 100%; max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle { color: rgba(255,255,255,0.9); font-size: 1.1rem; }
        
        /* Card Base */
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        
        .card-title {
            font-size: 1.1rem;
            color: #333;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Upload Area */
        .upload-area {
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
            text-align: center;
        }
        
        .upload-area:hover {
            background: #f0f2ff;
        }
        
        .upload-area.dragover { 
            background: #f0fff5;
        }
        
        .upload-icon { font-size: 3.5rem; margin-bottom: 15px; }
        .upload-text { font-size: 1.2rem; color: #333; font-weight: 600; margin-bottom: 8px; }
        .upload-hint { font-size: 0.9rem; color: #666; }
        
        input[type="file"] { display: none; }
        
        /* Controls */
        .control-row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .control-row label { 
            min-width: 70px; 
            color: #333; 
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        input[type="range"] {
            flex: 1;
            min-width: 150px;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-appearance: none;
            cursor: pointer;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(102,126,234,0.5);
        }
        
        .blur-value {
            min-width: 45px;
            text-align: center;
            color: #667eea;
            font-weight: bold;
            font-size: 1.1rem;
        }
        
        .info-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            padding: 12px 20px;
            margin-top: 20px;
            font-size: 0.95rem;
            text-align: center;
            color: white;
        }
        
        /* Batch Header */
        .batch-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .batch-title { font-size: 1.2rem; color: white; font-weight: 600; }
        .batch-actions { display: flex; gap: 10px; }
        
        .btn {
            padding: 12px 24px;
            font-size: 0.95rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }
        
        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 30px rgba(102,126,234,0.6);
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-secondary {
            background: #fff;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover { background: #667eea; color: white; }
        
        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .item-card {
            background: #fff;
            border-radius: 16px;
            padding: 15px;
            position: relative;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .item-card.transparent {
            background: transparent;
            box-shadow: none;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .item-preview {
            width: 100%;
            aspect-ratio: 16/9;
            background: #f5f5f5;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        
        .item-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .item-name {
            font-size: 0.85rem;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .item-status {
            font-size: 0.8rem;
            padding: 5px 12px;
            border-radius: 20px;
            text-align: center;
            display: inline-block;
        }
        
        .status-pending { background: #fff3e0; color: #ff9800; }
        .status-processing { background: #e3f2fd; color: #2196f3; }
        .status-done { background: #e8f5e9; color: #4caf50; }
        .status-error { background: #ffebee; color: #f44336; }
        
        .item-delete {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            transition: all 0.3s;
            box-shadow: 0 2px 10px rgba(102,126,234,0.4);
        }
        
        .item-delete:hover { transform: scale(1.1); }
        
        .item-transparent-toggle {
            position: absolute;
            top: 12px;
            right: 50px;
            width: 30px;
            height: 30px;
            background: rgba(102,126,234,0.2);
            color: #667eea;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            opacity: 0.5;
        }
        
        .item-transparent-toggle:hover { opacity: 1; transform: scale(1.1); }
        .item-card.transparent .item-transparent-toggle { background: rgba(102,126,234,0.6); color: #fff; opacity: 1; }
        
        .progress-bar {
            width: 100%;
            height: 5px;
            background: #eee;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        /* Stats */
        .stats {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .stat-item { text-align: center; }
        .stat-value { font-size: 2.2rem; font-weight: bold; color: #fff; }
        .stat-label { font-size: 0.9rem; color: rgba(255,255,255,0.8); margin-top: 5px; }
        
        .hidden { display: none !important; }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            z-index: 1000;
            animation: fadeIn 0.3s;
            box-shadow: 0 5px 20px rgba(76,175,80,0.4);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        /* Footer */
        .footer {
            background: #fff;
            padding: 6px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.1);
            margin-top: 15px;
            border-radius: 10px;
            font-size: 0.85rem;
        }
        
        .footer-left {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
            font-weight: 600;
        }
        
        .footer-left .brand { font-size: 1.1rem; }
        .footer-left .meta { font-size: 0.85rem; color: #888; }
        
        .btn-download {
            padding: 10px 20px;
            font-size: 0.9rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 3px 15px rgba(102,126,234,0.4);
            transition: all 0.3s;
        }
        
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.6);
        }
        
        @media (max-width: 768px) {
            .footer {
                flex-direction: column;
                gap: 10px;
                padding: 12px;
            }
            
            .footer-left {
                flex-direction: column;
                gap: 2px;
                text-align: center;
            }
            
            h1 { font-size: 2rem; }
            
            .batch-header { flex-direction: column; align-items: stretch; }
            .batch-actions { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>不想在大洋拉圖片的工具</h1>
            <p class="subtitle">上傳圖片，下載 16:9 版本（檔名加 _16x9）</p>
        </div>

        <div class="card">
            <label class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <p class="upload-text">點擊選擇多張圖片或拖曳到此處</p>
                <p class="upload-hint">支援 JPG, PNG, GIF, BMP, WEBP 格式</p>
                <input type="file" id="fileInput" accept="image/*" multiple>
            </label>
        </div>

        <div class="card">
            <div class="card-title">⚙️ 設定</div>
            <div class="control-row">
                <label>模糊程度</label>
                <input type="range" id="blurSlider" min="10" max="100" value="50">
                <span class="blur-value" id="blurValue">50</span>
            </div>
            <div class="info-box" id="infoText">選擇圖片開始轉換</div>
        </div>

        <div id="batchSection">
            <div class="batch-header">
                <div class="batch-title">待處理：<span id="pendingCount">0</span> 張</div>
                <div class="batch-actions">
                    <button class="btn btn-primary" id="processAllBtn">▶ 全部處理並下載</button>
                    <button class="btn btn-secondary" id="clearAllBtn">✕ 清除全部</button>
                </div>
            </div>

            <div class="grid" id="imageGrid"></div>

            <div class="stats" id="stats">
                <div class="stat-item">
                    <div class="stat-value" id="statDone">0</div>
                    <div class="stat-label">已完成</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statPending">0</div>
                    <div class="stat-label">待處理</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statError">0</div>
                    <div class="stat-label">失敗</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <div class="footer-left">
            <span class="brand">THREADS</span>
            <span class="meta">@Yorkwwwwong #方便工作</span>
        </div>
        <button class="btn-download" id="downloadHtmlBtn">📥 下載 HTML 離線版</button>
    </div>

    <script>
        const OUTPUT_W = 1920, OUTPUT_H = 1080;
        const canvas = document.createElement('canvas');
        canvas.width = OUTPUT_W;
        canvas.height = OUTPUT_H;
        const ctx = canvas.getContext('2d');

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const blurSlider = document.getElementById('blurSlider');
        const blurValue = document.getElementById('blurValue');
        const batchSection = document.getElementById('batchSection');
        const imageGrid = document.getElementById('imageGrid');
        const stats = document.getElementById('stats');
        const processAllBtn = document.getElementById('processAllBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const infoText = document.getElementById('infoText');
        const downloadHtmlBtn = document.getElementById('downloadHtmlBtn');

        let images = [];
        let isProcessing = false;

        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', e => handleFiles(e.target.files));

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const item = {
                            id: Date.now() + Math.random(),
                            file: file,
                            name: file.name,
                            size: file.size,
                            width: img.width,
                            height: img.height,
                            dataUrl: e.target.result,
                            status: 'pending'
                        };
                        images.push(item);
                        renderCard(item);
                        updateUI();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function renderCard(item) {
            let card = document.getElementById('card-' + item.id);
            if (!card) {
                card = document.createElement('div');
                card.id = 'card-' + item.id;
                card.className = 'item-card' + (item.transparent ? ' transparent' : '');
                card.innerHTML = `
                    <button class="item-delete" data-id="${item.id}">×</button>
                    <button class="item-transparent-toggle" data-id="${item.id}">◐</button>
                    <div class="item-preview"><img src="" alt="預覽"></div>
                    <div class="item-name"></div>
                    <div class="item-status status-pending"></div>
                    <div class="progress-bar"><div class="progress-fill" style="width: 0%"></div></div>
                `;
                imageGrid.appendChild(card);
                card.querySelector('.item-delete').addEventListener('click', () => deleteCard(item.id));
                card.querySelector('.item-transparent-toggle').addEventListener('click', (e) => {
                    item.transparent = !item.transparent;
                    card.classList.toggle('transparent', item.transparent);
                    e.target.textContent = item.transparent ? '◯' : '◐';
                    e.target.style.opacity = item.transparent ? '1' : '0.5';
                });
            }
            card.querySelector('img').src = item.dataUrl;
            card.querySelector('.item-name').textContent = item.name;
                card.querySelector('.item-transparent-toggle').style.opacity = item.transparent ? '1' : '0.5';
                card.querySelector('.item-transparent-toggle').textContent = item.transparent ? '◯' : '◐';
            updateCardStatus(card, item.status);
        }

        function updateCardStatus(card, status) {
            const statusEl = card.querySelector('.item-status');
            const progressEl = card.querySelector('.progress-fill');
            statusEl.className = 'item-status status-' + status;
            switch(status) {
                case 'pending': statusEl.textContent = '等待處理'; progressEl.style.width = '0%'; break;
                case 'processing': statusEl.textContent = '處理中...'; progressEl.style.width = '50%'; break;
                case 'done': statusEl.textContent = '已下載 ✓'; progressEl.style.width = '100%'; break;
                case 'error': statusEl.textContent = '失敗 ✗'; progressEl.style.width = '0%'; break;
            }
        }

        function deleteCard(id) {
            images = images.filter(img => img.id !== id);
            const card = document.getElementById('card-' + id);
            if (card) card.remove();
            updateUI();
        }

        function updateUI() {
            const pending = images.filter(i => i.status === 'pending').length;
            const done = images.filter(i => i.status === 'done').length;
            const error = images.filter(i => i.status === 'error').length;
            
            batchSection.classList.toggle('hidden', images.length === 0);
            
            infoText.textContent = images.length > 0 ? `已選擇 ${images.length} 張圖片` : '選擇圖片開始轉換';
            
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('statDone').textContent = done;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statError').textContent = error;
            
            processAllBtn.disabled = pending === 0 || isProcessing;
            processAllBtn.textContent = isProcessing ? '處理中...' : '▶ 全部處理並下載';
        }

        function processAndDownload(item) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const blurRadius = parseInt(blurSlider.value);
                    const imgRatio = img.width / img.height;
                    const canvasRatio = OUTPUT_W / OUTPUT_H;

                    let bgW, bgH, bgX, bgY;
                    if (imgRatio > canvasRatio) {
                        bgH = OUTPUT_H;
                        bgW = img.width * (OUTPUT_H / img.height);
                        bgX = (OUTPUT_W - bgW) / 2;
                        bgY = 0;
                    } else {
                        bgW = OUTPUT_W;
                        bgH = img.height * (OUTPUT_W / img.width);
                        bgX = 0;
                        bgY = (OUTPUT_H - bgH) / 2;
                    }

                    // 繪製底層：根據設定決定是否模糊
                    if (!item.transparent) {
                        ctx.filter = `blur(${blurRadius}px)`;
                        ctx.drawImage(img, bgX, bgY, bgW, bgH);
                        ctx.filter = 'none';
                    } else {
                        ctx.clearRect(0, 0, OUTPUT_W, OUTPUT_H);
                    }

                    ctx.filter = 'none';
                    const scale = Math.min(OUTPUT_W / img.width, OUTPUT_H / img.height);
                    const centerW = img.width * scale;
                    const centerH = img.height * scale;
                    const centerX = (OUTPUT_W - centerW) / 2;
                    const centerY = (OUTPUT_H - centerH) / 2;
                    ctx.drawImage(img, centerX, centerY, centerW, centerH);

                    const baseName = item.name.replace(/\.[^.]+$/, '');
                    const suffix = item.transparent ? '_transparent' : '_blurred';
                    const newName = `${baseName}${suffix}_16x9.png`;

                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = newName;
                    link.click();

                    resolve();
                };
                img.src = item.dataUrl;
            });
        }

        async function processAll() {
            if (isProcessing) return;
            isProcessing = true;
            updateUI();

            for (const item of images) {
                if (item.status === 'done') continue;
                
                item.status = 'processing';
                const card = document.getElementById('card-' + item.id);
                if (card) updateCardStatus(card, 'processing');
                updateUI();

                try {
                    await processAndDownload(item);
                    item.status = 'done';
                } catch (e) {
                    item.status = 'error';
                    console.error('處理失敗:', e);
                }
                
                if (card) updateCardStatus(card, item.status);
                updateUI();
                
                await new Promise(r => setTimeout(r, 500));
            }

            isProcessing = false;
            updateUI();
            showToast(`已下載 ${images.filter(i => i.status === 'done').length} 張圖片`);
        }

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function clearAll() {
            images = [];
            imageGrid.innerHTML = '';
            updateUI();
            fileInput.value = '';
        }

        downloadHtmlBtn.addEventListener('click', () => {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '16x9_converter.html';
            a.click();
            URL.revokeObjectURL(url);
            showToast('已下載離線版！');
        });

        blurSlider.addEventListener('input', e => blurValue.textContent = e.target.value);
        processAllBtn.addEventListener('click', processAll);
        clearAllBtn.addEventListener('click', clearAll);
    </script>
</body>
</html>
