<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16:9 批次轉換器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            padding: 40px 20px;
            color: #fff;
        }
        
        .container { width: 100%; max-width: 1200px; margin: 0 auto; }
        
        h1 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #e94560, #0f3460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle { color: #888; text-align: center; margin-bottom: 30px; }
        
        .upload-area {
            border: 3px dashed #0f3460;
            border-radius: 20px;
            padding: 60px 40px;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(15, 52, 96, 0.3);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .upload-area:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }
        
        .upload-area.dragover { border-color: #4ecca3; background: rgba(78, 204, 163, 0.2); }
        
        .upload-icon { font-size: 4rem; margin-bottom: 20px; }
        .upload-text { font-size: 1.2rem; color: #ccc; }
        .upload-hint { font-size: 0.9rem; color: #666; margin-top: 10px; }
        
        input[type="file"] { display: none; }
        
        .controls {
            background: rgba(22, 33, 62, 0.8);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }
        
        .control-row {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .control-row label { min-width: 80px; color: #ccc; }
        
        input[type="range"] {
            flex: 1;
            min-width: 200px;
            height: 8px;
            border-radius: 4px;
            background: #0f3460;
            -webkit-appearance: none;
            cursor: pointer;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #e94560;
            cursor: pointer;
        }
        
        .blur-value {
            min-width: 50px;
            text-align: right;
            color: #e94560;
            font-weight: bold;
        }
        
        .info {
            background: rgba(15, 52, 96, 0.5);
            border-radius: 10px;
            padding: 15px 20px;
            margin-top: 15px;
            font-size: 0.9rem;
            text-align: center;
            color: #4ecca3;
        }
        
        .batch-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .batch-title { font-size: 1.3rem; color: #e94560; }
        
        .batch-actions { display: flex; gap: 10px; }
        
        .btn {
            padding: 10px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: white;
        }
        
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-secondary {
            background: rgba(15, 52, 96, 0.5);
            border: 1px solid #0f3460;
            color: #ccc;
        }
        
        .btn-secondary:hover { border-color: #e94560; color: #e94560; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(22, 33, 62, 0.8);
            border-radius: 15px;
            padding: 15px;
            position: relative;
        }
        
        .card-preview {
            width: 100%;
            aspect-ratio: 16/9;
            background: #0a0a15;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        .card-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .card-name {
            font-size: 0.85rem;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }
        
        .card-status {
            font-size: 0.8rem;
            padding: 5px 10px;
            border-radius: 5px;
            text-align: center;
        }
        
        .status-pending { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .status-processing { background: rgba(0, 123, 255, 0.2); color: #17a2b8; }
        .status-done { background: rgba(78, 204, 163, 0.2); color: #4ecca3; }
        .status-error { background: rgba(233, 69, 96, 0.2); color: #e94560; }
        
        .card-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(233, 69, 96, 0.8);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
            transition: 0.3s;
        }
        
        .card-delete:hover { background: #e94560; transform: scale(1.1); }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #0f3460;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecca3, #e94560);
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .stat-item { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #4ecca3; }
        .stat-label { font-size: 0.9rem; color: #888; }
        
        .hidden { display: none !important; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(78, 204, 163, 0.95);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>16:9 批次轉換器</h1>
        <p class="subtitle">上傳圖片，自動下載 16:9 版本（檔名加 _16x9）</p>

        <label class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <p class="upload-text">點擊選擇多張圖片或拖曳到此處</p>
            <p class="upload-hint">支援 JPG, PNG, GIF, BMP, WEBP 格式</p>
            <input type="file" id="fileInput" accept="image/*" multiple>
        </label>

        <div class="controls">
            <div class="control-row">
                <label>模糊程度</label>
                <input type="range" id="blurSlider" min="10" max="100" value="50">
                <span class="blur-value" id="blurValue">50</span>
            </div>
            <div class="info" id="infoText">選擇圖片開始轉換</div>
        </div>

        <div class="batch-header" id="batchHeader">
            <div class="batch-title">待處理：<span id="pendingCount">0</span> 張</div>
            <div class="batch-actions">
                <button class="btn btn-primary" id="processAllBtn">▶ 全部處理並下載</button>
                <button class="btn btn-secondary" id="clearAllBtn">✕ 清除全部</button>
            </div>
        </div>

        <div class="grid" id="imageGrid"></div>

        <div class="stats" id="stats">
            <div class="stat-item"><div class="stat-value" id="statDone">0</div><div class="stat-label">已完成</div></div>
            <div class="stat-item"><div class="stat-value" id="statPending">0</div><div class="stat-label">待處理</div></div>
            <div class="stat-item"><div class="stat-value" id="statError">0</div><div class="stat-label">失敗</div></div>
        </div>
    </div>

    <script>
        const OUTPUT_W = 1920, OUTPUT_H = 1080;
        const canvas = document.createElement('canvas');
        canvas.width = OUTPUT_W;
        canvas.height = OUTPUT_H;
        const ctx = canvas.getContext('2d');

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const blurSlider = document.getElementById('blurSlider');
        const blurValue = document.getElementById('blurValue');
        const batchHeader = document.getElementById('batchHeader');
        const imageGrid = document.getElementById('imageGrid');
        const stats = document.getElementById('stats');
        const processAllBtn = document.getElementById('processAllBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const infoText = document.getElementById('infoText');

        let images = [];
        let isProcessing = false;

        // 拖放上傳
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', e => handleFiles(e.target.files));

        // 處理檔案
        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const item = {
                            id: Date.now() + Math.random(),
                            file: file,
                            name: file.name,
                            size: file.size,
                            width: img.width,
                            height: img.height,
                            dataUrl: e.target.result,
                            status: 'pending'
                        };
                        images.push(item);
                        renderCard(item);
                        updateUI();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // 渲染卡片
        function renderCard(item) {
            let card = document.getElementById('card-' + item.id);
            if (!card) {
                card = document.createElement('div');
                card.id = 'card-' + item.id;
                card.className = 'card';
                card.innerHTML = `
                    <button class="card-delete" data-id="${item.id}">×</button>
                    <div class="card-preview"><img src="" alt="預覽"></div>
                    <div class="card-name"></div>
                    <div class="card-status status-pending"></div>
                    <div class="progress-bar"><div class="progress-fill" style="width: 0%"></div></div>
                `;
                imageGrid.appendChild(card);
                card.querySelector('.card-delete').addEventListener('click', () => deleteCard(item.id));
            }
            card.querySelector('img').src = item.dataUrl;
            card.querySelector('.card-name').textContent = item.name;
            updateCardStatus(card, item.status);
        }

        function updateCardStatus(card, status) {
            const statusEl = card.querySelector('.card-status');
            const progressEl = card.querySelector('.progress-fill');
            statusEl.className = 'card-status status-' + status;
            switch(status) {
                case 'pending': statusEl.textContent = '等待處理'; progressEl.style.width = '0%'; break;
                case 'processing': statusEl.textContent = '處理中...'; progressEl.style.width = '50%'; break;
                case 'done': statusEl.textContent = '已下載 ✓'; progressEl.style.width = '100%'; break;
                case 'error': statusEl.textContent = '失敗 ✗'; progressEl.style.width = '0%'; break;
            }
        }

        function deleteCard(id) {
            images = images.filter(img => img.id !== id);
            const card = document.getElementById('card-' + id);
            if (card) card.remove();
            updateUI();
        }

        // 更新介面
        function updateUI() {
            const pending = images.filter(i => i.status === 'pending').length;
            const done = images.filter(i => i.status === 'done').length;
            const error = images.filter(i => i.status === 'error').length;
            
            batchHeader.classList.toggle('hidden', images.length === 0);
            imageGrid.classList.toggle('hidden', images.length === 0);
            stats.classList.toggle('hidden', images.length === 0);
            
            infoText.textContent = images.length > 0 ? `已選擇 ${images.length} 張圖片` : '選擇圖片開始轉換';
            
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('statDone').textContent = done;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statError').textContent = error;
            
            processAllBtn.disabled = pending === 0 || isProcessing;
            processAllBtn.textContent = isProcessing ? '處理中...' : '▶ 全部處理並下載';
        }

        // 處理並下載圖片
        function processAndDownload(item) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const blurRadius = parseInt(blurSlider.value);
                    const imgRatio = img.width / img.height;
                    const canvasRatio = OUTPUT_W / OUTPUT_H;

                    let bgW, bgH, bgX, bgY;
                    if (imgRatio > canvasRatio) {
                        bgH = OUTPUT_H;
                        bgW = img.width * (OUTPUT_H / img.height);
                        bgX = (OUTPUT_W - bgW) / 2;
                        bgY = 0;
                    } else {
                        bgW = OUTPUT_W;
                        bgH = img.height * (OUTPUT_W / img.width);
                        bgX = 0;
                        bgY = (OUTPUT_H - bgH) / 2;
                    }

                    ctx.filter = `blur(${blurRadius}px)`;
                    ctx.drawImage(img, bgX, bgY, bgW, bgH);

                    ctx.filter = 'none';
                    const scale = Math.min(OUTPUT_W / img.width, OUTPUT_H / img.height);
                    const centerW = img.width * scale;
                    const centerH = img.height * scale;
                    const centerX = (OUTPUT_W - centerW) / 2;
                    const centerY = (OUTPUT_H - centerH) / 2;
                    ctx.drawImage(img, centerX, centerY, centerW, centerH);

                    // 生成檔名
                    const baseName = item.name.replace(/\.[^.]+$/, '');
                    const newName = `${baseName}_16x9.png`;

                    // 下載
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = newName;
                    link.click();

                    resolve();
                };
                img.src = item.dataUrl;
            });
        }

        // 批次處理
        async function processAll() {
            if (isProcessing) return;
            isProcessing = true;
            updateUI();

            for (const item of images) {
                if (item.status === 'done') continue;
                
                item.status = 'processing';
                const card = document.getElementById('card-' + item.id);
                if (card) updateCardStatus(card, 'processing');
                updateUI();

                try {
                    await processAndDownload(item);
                    item.status = 'done';
                } catch (e) {
                    item.status = 'error';
                    console.error('處理失敗:', e);
                }
                
                if (card) updateCardStatus(card, item.status);
                updateUI();
                
                await new Promise(r => setTimeout(r, 500));
            }

            isProcessing = false;
            updateUI();
            showToast(`已下載 ${images.filter(i => i.status === 'done').length} 張圖片`);
        }

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 清除全部
        function clearAll() {
            images = [];
            imageGrid.innerHTML = '';
            updateUI();
            fileInput.value = '';
        }

        // 事件監聽
        blurSlider.addEventListener('input', e => blurValue.textContent = e.target.value);
        processAllBtn.addEventListener('click', processAll);
        clearAllBtn.addEventListener('click', clearAll);
    </script>
</body>
</html>
